version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resumescore}
      POSTGRES_USER: ${POSTGRES_USER:-resumescore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumescore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resumescore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-resumescore}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_UPLOAD_PATH: /app/uploads
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.0-flash}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HIRING_AGENT_PATH: /app/hiring-agent
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    volumes:
      - ./hiring-agent:/app/hiring-agent:ro
      - resume_uploads:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-resumescore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-resumescore}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_UPLOAD_PATH: /app/uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.0-flash}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      HIRING_AGENT_PATH: /app/hiring-agent
    volumes:
      - ./hiring-agent:/app/hiring-agent:ro
      - resume_uploads:/app/uploads
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=2

  flower:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on: [redis]
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    command: celery -A app.workers.tasks flower --port=5555

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://api:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  resume_uploads:
