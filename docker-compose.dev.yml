version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: resumescore
      POSTGRES_USER: resumescore
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://resumescore:password@postgres:5432/resumescore
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production-use
      STORAGE_BACKEND: local
      LOCAL_UPLOAD_PATH: /app/uploads
      HIRING_AGENT_PATH: /app/hiring-agent
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.0-flash}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./apps/api:/app
      - ./hiring-agent:/app/hiring-agent:ro
      - resume_uploads_dev:/app/uploads
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://resumescore:password@postgres:5432/resumescore
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-not-for-production-use
      STORAGE_BACKEND: local
      LOCAL_UPLOAD_PATH: /app/uploads
      HIRING_AGENT_PATH: /app/hiring-agent
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gemini-2.0-flash}
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      - ./apps/api:/app
      - ./hiring-agent:/app/hiring-agent:ro
      - resume_uploads_dev:/app/uploads
    command: celery -A app.workers.tasks worker --loglevel=debug --concurrency=1

volumes:
  postgres_data_dev:
  resume_uploads_dev:
